org: weatherstreamorg
app: weatherstream-backend
service: weatherstream-backend

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  environment:
    WEATHER_API_KEY: ${env:WEATHER_API_KEY}
    OPENAI_API_KEY: ${env:OPENAI_API_KEY}

functions:
  api:
    handler: lambda.handler
    events:
      - http:
          path: /
          method: ANY
          cors: true
      - http:
          path: /{proxy+}
          method: ANY
          cors: true

plugins:
  - serverless-dotenv-plugin
